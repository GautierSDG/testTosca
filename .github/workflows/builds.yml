name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller PyJWT cryptography requests
      
      - name: Build EXE
        run: |
          pyinstaller --onefile generate_token.py
      
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: generate_token
          path: dist/generate_token.exe
